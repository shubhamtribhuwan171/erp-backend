services:
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    ports:
      - "6432:5432"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres

volumes:
  db_data:
